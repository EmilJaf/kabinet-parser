name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: unec
          POSTGRES_USER: unec
          POSTGRES_PASSWORD: unec
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U unec -d unec"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Same Fernet/JWT keys used in the dev .env — random non-secret values
      # baked in here so CI doesn't need any GitHub Secrets to run.
      DATABASE_URL: postgresql+asyncpg://unec:unec@localhost:5432/unec
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-real-use-only-for-tests-xxxxxxxxxxxxxxxx
      FERNET_KEY: V2hHN3ZqRVlsdXl4UE5EUjZRR3F4d2x1amVqU3FCdnQ=
      CORS_ORIGINS: http://localhost:5174

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Start API in background
        run: |
          uvicorn unec.api.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/api.pid

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "api up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "api never came up" >&2
          exit 1

      - name: Run pytest
        run: pytest -v

      - name: Stop API
        if: always()
        run: kill "$(cat /tmp/api.pid)" || true

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx vue-tsc --noEmit

      - name: Build (validates Vite + PWA emit)
        run: npm run build

  deploy:
    name: Deploy to prod
    needs: [backend, frontend]
    # Only on push to main; skip for PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Avoid two deploys racing each other.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    env:
      # All three pulled from GitHub Secrets so the public repo doesn't
      # expose the prod hostname or remote user.
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Load deploy key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Trust prod host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'EOF'
            set -euo pipefail
            cd ~/kabinet-parser
            echo "→ git pull"
            git pull --ff-only
            echo "→ docker compose build (cache reuse for unchanged layers)"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            echo "→ docker compose up -d"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            echo "→ docker image prune"
            docker image prune -f
            echo "→ deploy done"
          EOF
